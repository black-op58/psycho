name: Release SaninTV

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.2.4)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          else
            echo "KEYSTORE_BASE64 secret not set!"
            exit 1
          fi

      - name: Build signed release APK
        env:
          STORE_FILE: release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleGoogleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          APK_PATH="app/build/outputs/apk/google/release"
          APK_FILE=$(ls "$APK_PATH"/*.apk 2>/dev/null | head -1)
          
          if [ -z "$APK_FILE" ]; then
            echo "No APK found at $APK_PATH"
            exit 1
          fi
          
          gh release create "v$VERSION" \
            --title "SaninTV v$VERSION" \
            --notes "Release version $VERSION" \
            "$APK_FILE"
