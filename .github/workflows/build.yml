name: Build SaninTV

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK (google flavor)
        run: ./gradlew assembleGoogleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SaninTV-debug
          path: app/build/outputs/apk/google/debug/*.apk

      - name: Build release APK (google flavor, signed)
        env:
          STORE_FILE: debug.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: ./gradlew assembleGoogleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SaninTV-release-signed
          path: app/build/outputs/apk/google/release/*.apk
