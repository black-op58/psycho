name: Build SaninTV

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "Keystore decoded from secrets"
          else
            echo "No KEYSTORE_BASE64 secret, using debug keystore"
          fi

      - name: Build debug APK (google flavor)
        run: ./gradlew assembleGoogleDebug

      - name: Build release APK (google flavor, signed)
        env:
          STORE_FILE: release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ]; then
            ./gradlew assembleGoogleRelease
          else
            echo "Signing secrets not set, building with debug keystore"
            STORE_FILE="debug.keystore" ./gradlew assembleGoogleRelease
          fi

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="app/build/outputs/apk/google/release"
          DEBUG_PATH="app/build/outputs/apk/google/debug"
          
          RELEASE_APK=$(ls "$APK_PATH"/*.apk 2>/dev/null | head -1)
          DEBUG_APK=$(ls "$DEBUG_PATH"/*.apk 2>/dev/null | head -1)
          
          VERSION="build-$(date +%Y%m%d-%H%M%S)"
          TAG="v$VERSION"
          
          ASSETS=""
          if [ -n "$RELEASE_APK" ]; then
            ASSETS="$RELEASE_APK"
          fi
          if [ -n "$DEBUG_APK" ]; then
            ASSETS="$ASSETS $DEBUG_APK"
          fi
          
          if [ -z "$ASSETS" ]; then
            echo "No APK files found!"
            exit 1
          fi
          
          # Delete existing release with same tag if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          
          gh release create "$TAG" \
            --title "SaninTV $VERSION" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            $ASSETS
