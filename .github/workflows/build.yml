name: Build SaninTV

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "Keystore decoded from secrets"
          else
            echo "No KEYSTORE_BASE64 secret, using debug keystore"
          fi

      - name: Build debug APK (google flavor)
        run: ./gradlew assembleGoogleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SaninTV-debug
          path: app/build/outputs/apk/google/debug/*.apk

      - name: Build release APK (google flavor, signed)
        env:
          STORE_FILE: release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ]; then
            ./gradlew assembleGoogleRelease
          else
            echo "Signing secrets not set, building with debug keystore"
            STORE_FILE="debug.keystore" ./gradlew assembleGoogleRelease
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SaninTV-release-signed
          path: app/build/outputs/apk/google/release/*.apk
